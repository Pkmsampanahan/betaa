<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    :root {
      --primary: #0ea5e9;
      --bg: #0f172a;
      --glass: rgba(30, 41, 59, 0.7);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --card-border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: #f8fafc;
      margin: 0;
      padding: 10px;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
      padding: 10px 0;
      border-bottom: 1px solid #334155;
    }

    header h1 {
      font-size: 1.2rem;
      color: var(--primary);
      margin: 0;
      text-align: center;
    }

    #odf_status_container {
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
    .odf-badge {
      padding: 8px 15px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 0.9rem;
      display: inline-block;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .filter-box label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .filter-box select, .filter-box input {
      width: 100%;
      padding: 10px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid #334155;
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 25px;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    /* Penyesuaian Grafik */
    .charts-grid {
      display: none; /* Awalnya disembunyikan */
      grid-template-columns: 1fr;
      gap: 15px;
      margin-bottom: 25px;
      animation: slideDown 0.4s ease-out;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-card { text-align: center; }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #334155;
      background: rgba(15, 23, 42, 0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    th {
      background: #1e293b;
      color: var(--primary);
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #334155;
      white-space: nowrap;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      white-space: nowrap;
    }

    .badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .badge-success { background: var(--success); color: white; }
    .badge-danger { background: var(--danger); color: white; }
    .badge-warning { background: var(--warning); color: white; }

    .btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: 0.8rem;
      flex: 1;
    }

    .header-btns {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-info { background: #6366f1; color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-outline { 
      background: transparent; 
      border: 1px solid var(--primary); 
      color: var(--primary); 
      margin-bottom: 15px;
      width: 100%;
    }

    .modal-content {
      background: #1e293b;
      width: 90%;
      max-width: 600px;
      border-radius: 20px;
      padding: 20px;
      max-height: 85vh;
      overflow-y: auto;
    }

    @media (min-width: 768px) {
      body { padding: 20px; }
      header { flex-direction: row; }
      header h1 { text-align: left; font-size: 1.4rem; }
      .header-btns { width: auto; }
      .filter-grid { grid-template-columns: repeat(3, 1fr); }
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
      .charts-grid { grid-template-columns: 1.5fr 1fr; }
      .stat-value { font-size: 1.8rem; }
      .stat-label { font-size: 0.8rem; }
      table { font-size: 0.85rem; }
    }

    #loading_overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.9);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10000;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(14, 165, 233, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body id="dashboard_body">

  <div id="loading_overlay">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: bold; font-size: 0.9rem;">Memproses Data...</p>
  </div>

  <div class="modal-overlay" id="modalDetail" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9999;">
    <div class="modal-content">
      <h3 style="color: var(--primary); border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top: 0;">📋 Detail Data</h3>
      <div id="detail_content"></div>
      <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="closeModal()">Tutup</button>
    </div>
  </div>

  <header>
    <h1>📊 Dashboard STBM Kotabaru</h1>
    <div class="header-btns">
      <button class="btn btn-info" onclick="generatePDF()">📄 PDF</button>
      <button class="btn btn-success" onclick="exportFullReport()">📥 Excel</button>
      <button class="btn btn-primary" onclick="fetchRealData()">🔄 Refresh</button>
    </div>
  </header>

  <div id="odf_status_container">
    <div id="odf_badge" class="odf-badge"></div>
  </div>

  <div class="card" style="margin-bottom: 20px;">
    <div class="filter-grid">
      <div class="filter-box">
        <label>Cari Nama KK</label>
        <input type="text" id="filter_nama" placeholder="Ketik nama..." oninput="applyFilters()">
      </div>
      <div class="filter-box">
        <label>Filter Desa</label>
        <select id="filter_desa" onchange="applyFilters()">
          <option value="SEMUA">Semua Desa</option>
          <option value="SAMPANAHAN HILIR">SAMPANAHAN HILIR</option>
          <option value="SAMPANAHAN HULU">SAMPANAHAN HULU</option>
          <option value="SUKA MAJU">SUKA MAJU</option>
          <option value="BANJARSARI">BANJARSARI</option>
        </select>
      </div>
      <div class="filter-box">
        <label>Pilih Tanggal</label>
        <input type="date" id="filter_tgl" onchange="applyFilters()">
      </div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="card stat-card">
      <span class="stat-value" id="total_kk">0</span>
      <span class="stat-label">Total KK</span>
    </div>
    <div class="card stat-card">
      <span class="stat-value" style="color: var(--success);" id="total_aman">0</span>
      <span class="stat-label">P1 Aman</span>
    </div>
    <div class="card stat-card">
      <span class="stat-value" style="color: var(--warning);" id="total_sharing">0</span>
      <span class="stat-label">P1 Sharing</span>
    </div>
    <div class="card stat-card">
      <span class="stat-value" style="color: var(--danger);" id="total_od">0</span>
      <span class="stat-label">P1 OD</span>
    </div>
  </div>

  <button class="btn btn-outline" id="btn_toggle_charts" onclick="toggleCharts()">📈 TAMPILKAN ANALISA GRAFIK</button>

  <div class="charts-grid" id="charts_area">
    <div class="card chart-container" style="min-height: 280px;">
      <h2 style="font-size: 1rem;">📈 Capaian 5 Pilar (%)</h2>
      <canvas id="stbmChart"></canvas>
    </div>
    <div class="card chart-container" style="min-height: 280px;">
      <h2 style="font-size: 1rem;">🚻 Status Pilar 1</h2>
      <canvas id="pieChartP1"></canvas>
    </div>
  </div>

  <div class="card">
    <h2 style="font-size: 1rem;">📋 Monitoring Real-Time</h2>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Nama KK</th>
            <th>Desa</th>
            <th>Status P1</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="admin_table_body"></tbody>
      </table>
    </div>
  </div>

  <script>
    let allData = [];
    let stbmChart = null;
    let pieChart = null;
    let chartsVisible = false;

    window.onload = function() {
      fetchRealData();
    };

    function showLoading(show) {
      document.getElementById('loading_overlay').style.display = show ? 'flex' : 'none';
    }

    function toggleCharts() {
      const area = document.getElementById('charts_area');
      const btn = document.getElementById('btn_toggle_charts');
      chartsVisible = !chartsVisible;
      
      if (chartsVisible) {
        area.style.display = 'grid';
        btn.innerText = '📉 SEMBUNYIKAN ANALISA GRAFIK';
        updateCharts(getFilteredData()); // Render ulang grafik saat ditampilkan
      } else {
        area.style.display = 'none';
        btn.innerText = '📈 TAMPILKAN ANALISA GRAFIK';
      }
    }

    function fetchRealData() {
      showLoading(true);
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(data => {
          allData = data;
          applyFilters();
          showLoading(false);
        }).getDatabase();
      } else {
        setTimeout(() => {
          allData = [
            { Tanggal: '2026-05-12', Nama_KK: 'Adi Purnomo', No_KK: '6302012345678901', Desa: 'SUKA MAJU', Jml_Jiwa: 4, Jml_Menetap: 4, Status_P1: 'AMAN', Status_P2: 'CTPS', Status_P3: 'PAMMRT', Status_P4: 'PSRT', Status_P5: 'PLCRT' },
            { Tanggal: '2026-05-11', Nama_KK: 'Budi Santoso', No_KK: '6302019876543210', Desa: 'BANJARSARI', Jml_Jiwa: 5, Jml_Menetap: 3, Status_P1: 'OD TERTUTUP', Status_P2: 'TIDAK CTPS', Status_P3: 'TIDAK PAMMRT', Status_P4: 'TIDAK PSRT', Status_P5: 'TIDAK PLCRT' }
          ];
          applyFilters();
          showLoading(false);
        }, 1000);
      }
    }

    function getFilteredData() {
      const nama = document.getElementById('filter_nama').value.toLowerCase();
      const desa = document.getElementById('filter_desa').value;
      const tgl = document.getElementById('filter_tgl').value;

      return allData.filter(d => {
        const matchNama = d.Nama_KK.toLowerCase().includes(nama);
        const matchDesa = desa === "SEMUA" || d.Desa === desa;
        const matchTgl = !tgl || d.Tanggal === tgl;
        return matchNama && matchDesa && matchTgl;
      });
    }

    function applyFilters() {
      const filtered = getFilteredData();
      const desa = document.getElementById('filter_desa').value;

      updateODFIndicator(filtered, desa);
      updateStats(filtered);
      renderTable(filtered);
      if (chartsVisible) updateCharts(filtered);
    }

    function updateODFIndicator(data, desa) {
      const container = document.getElementById('odf_status_container');
      const badge = document.getElementById('odf_badge');
      if (desa === "SEMUA" || data.length === 0) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'block';
      const hasOD = data.some(d => d.Status_P1.includes('OD') || d.Status_P1 === 'BELUM LAYAK');
      if (hasOD) {
        badge.innerText = `⚠️ ${desa}: BELUM ODF`;
        badge.style.background = 'var(--danger)';
      } else {
        badge.innerText = `✅ ${desa}: DESA ODF`;
        badge.style.background = 'var(--success)';
      }
    }

    function updateStats(data) {
      document.getElementById('total_kk').innerText = data.length;
      document.getElementById('total_aman').innerText = data.filter(d => d.Status_P1 === 'AMAN').length;
      document.getElementById('total_sharing').innerText = data.filter(d => d.Status_P1 === 'SHARING').length;
      document.getElementById('total_od').innerText = data.filter(d => d.Status_P1.includes('OD')).length;
    }

    function renderTable(data) {
      const tbody = document.getElementById('admin_table_body');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Kosong</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(d => `
        <tr>
          <td>${d.Tanggal}</td>
          <td>${d.Nama_KK}</td>
          <td>${d.Desa}</td>
          <td><span class="badge ${getBadgeClass(d.Status_P1)}">${d.Status_P1}</span></td>
          <td>
            <div style="display:flex; gap:4px;">
              <button class="btn btn-info" style="padding:4px 8px; font-size:0.6rem;" onclick="viewDetail('${d.No_KK}')">👁️</button>
              <button class="btn btn-danger" style="padding:4px 8px; font-size:0.6rem;" onclick="deleteRow('${d.No_KK}')">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function getBadgeClass(val) {
      if (['AMAN', 'LAYAK'].includes(val)) return 'badge-success';
      if (val.includes('OD')) return 'badge-danger';
      return 'badge-warning';
    }

    function viewDetail(noKK) {
      const data = allData.find(d => d.No_KK === noKK);
      if (!data) return;
      const html = `
        <div style="font-size:0.85rem;">
          <p><b>Nama:</b> ${data.Nama_KK}</p>
          <p><b>Desa:</b> ${data.Desa}</p>
          <hr style="border:0; border-top:1px solid #334155;">
          <p>P1: ${data.Status_P1}</p>
          <p>P2: ${data.Status_P2}</p>
          <p>P3: ${data.Status_P3}</p>
          <p>P4: ${data.Status_P4}</p>
          <p>P5: ${data.Status_P5}</p>
        </div>`;
      document.getElementById('detail_content').innerHTML = html;
      document.getElementById('modalDetail').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalDetail').style.display = 'none'; }

    function updateCharts(data) {
      const total = data.length || 1;
      const barData = [
        (data.filter(d => ['AMAN', 'LAYAK'].includes(d.Status_P1)).length / total) * 100,
        (data.filter(d => d.Status_P2 === 'CTPS').length / total) * 100,
        (data.filter(d => d.Status_P3 === 'PAMMRT').length / total) * 100,
        (data.filter(d => d.Status_P4 === 'PSRT').length / total) * 100,
        (data.filter(d => d.Status_P5 === 'PLCRT').length / total) * 100
      ];
      const pieData = [
        data.filter(d => d.Status_P1 === 'AMAN').length,
        data.filter(d => d.Status_P1 === 'LAYAK').length,
        data.filter(d => d.Status_P1 === 'SHARING').length,
        data.filter(d => d.Status_P1.includes('OD')).length
      ];

      const isMobile = window.innerWidth < 768;

      if (stbmChart) stbmChart.destroy();
      stbmChart = new Chart(document.getElementById('stbmChart'), {
        type: 'bar',
        data: {
          labels: ['P1', 'P2', 'P3', 'P4', 'P5'],
          datasets: [{ data: barData, backgroundColor: ['#0ea5e9', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'], borderRadius: 5 }]
        },
        options: { 
          indexAxis: isMobile ? 'y' : 'x', 
          responsive: true, 
          maintainAspectRatio: false, 
          plugins: { legend: { display: false } }, 
          scales: { 
            y: { beginAtZero: true, max: isMobile ? undefined : 100, ticks: { font: { size: 10 }, color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }, 
            x: { beginAtZero: true, max: isMobile ? 100 : undefined, ticks: { font: { size: 10 }, color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } } 
          } 
        }
      });

      if (pieChart) pieChart.destroy();
      pieChart = new Chart(document.getElementById('pieChartP1'), {
        type: 'pie',
        data: {
          labels: ['Aman', 'Layak', 'Sharing', 'OD'],
          datasets: [{ data: pieData, backgroundColor: ['#10b981', '#0ea5e9', '#f59e0b', '#ef4444'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 }, color: '#94a3b8' } } } }
      });
    }

    async function generatePDF() {
      showLoading(true);
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');
      const canvas = await html2canvas(document.getElementById('dashboard_body'), { scale: 1.5 });
      const imgWidth = 210;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      doc.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, imgWidth, imgHeight);
      doc.save(`STBM_${new Date().getTime()}.pdf`);
      showLoading(false);
    }

    function exportFullReport() {
      const ws = XLSX.utils.json_to_sheet(allData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Database");
      XLSX.writeFile(wb, "STBM_Kotabaru.xlsx");
    }

    function deleteRow(noKK) {
      if (confirm(`Hapus data ${noKK}?`)) {
        showLoading(true);
        if (typeof google !== 'undefined') {
          google.script.run.withSuccessHandler(() => fetchRealData()).deleteData(noKK);
        } else {
          allData = allData.filter(d => d.No_KK !== noKK);
          applyFilters();
          showLoading(false);
        }
      }
    }
  </script>
</body>
</html>
