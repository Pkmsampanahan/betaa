<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #0ea5e9;
      --bg: #0f172a;
      --glass: rgba(30, 41, 59, 0.7);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --excel: #16a34a;
    }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: var(--bg); 
      color: #f8fafc;
      margin: 0; padding: 15px;
    }

    /* Status Antrean Style */
    #sync_status {
      display: none;
      position: sticky;
      top: 0;
      z-index: 1001;
      background: var(--warning);
      color: #000;
      text-align: center;
      padding: 8px;
      font-size: 0.85rem;
      font-weight: bold;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      margin-bottom: 10px;
    }

    /* Progress Bar Styles */
    .progress-container {
      width: 100%; height: 8px; background: rgba(255,255,255,0.1);
      border-radius: 10px; margin-bottom: 20px; overflow: hidden;
      display: none;
    }
    #progress_fill {
      height: 100%; width: 0%; background: var(--primary);
      transition: width 0.3s ease; box-shadow: 0 0 10px var(--primary);
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
    }
    
    /* Toggle Identitas Logic */
    .card-collapsed {
      padding: 10px 20px;
    }
    .card-collapsed .card-content {
      display: none;
    }
    .card-header-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .badge-info {
      font-size: 0.75rem;
      background: var(--primary);
      padding: 2px 8px;
      border-radius: 10px;
      display: none;
    }

    h2 { color: var(--primary); font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top: 0; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .input-box { margin-bottom: 15px; }
    label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #94a3b8; }
    input, select, textarea {
      width: 100%; padding: 10px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid #334155;
      border-radius: 8px; color: white;
      box-sizing: border-box;
      font-size: 0.9rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }
    input[readonly], select[disabled] {
      background: rgba(255, 255, 255, 0.05);
      color: #94a3b8;
      cursor: not-allowed;
    }
    
    /* Stepper & Navigation Styling */
    .pilar-section {
      background: rgba(255,255,255,0.03);
      padding: 15px; border-radius: 8px; margin-top: 10px;
      border-left: 4px solid var(--primary);
      display: none;
    }
    .pilar-section.active {
      display: block;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .nav-buttons { display: flex; gap: 10px; margin-top: 15px; }
    .btn-back {
      background: #334155; color: white; border: none; flex: 1;
      padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer;
    }

    .question-item { margin-bottom: 12px; }
    .btn-save {
      background: var(--primary);
      color: white; border: none; width: 100%;
      padding: 15px; border-radius: 12px;
      font-weight: bold; cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }
    .btn-save:hover { background: #0284c7; }

    .btn-kk {
      padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px;
    }
    .btn-save-kk { background: var(--success); color: white; }
    .btn-edit-kk { background: var(--warning); color: white; display: none; }
    
    .btn-next {
      background: var(--success);
      color: white; border: none; flex: 2;
      padding: 12px; border-radius: 12px;
      font-weight: bold; cursor: pointer;
      display: none;
    }

    /* Ringkasan Styles */
    .summary-box {
      margin-top: 15px; padding: 12px; border-radius: 8px;
      background: rgba(255,255,255,0.05); font-size: 0.85rem;
    }
    .summary-item { display: flex; justify-content: space-between; margin-bottom: 5px; }

    /* Modern Modal Styling */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      z-index: 9999; padding: 20px;
    }
    .modal-content {
      background: #1e293b;
      width: 100%; max-width: 600px;
      border-radius: 24px; border: 1px solid var(--primary);
      padding: 25px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 0 50px rgba(14, 165, 233, 0.3);
      animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .modal-header { text-align: center; margin-bottom: 20px; }
    .modal-header h3 { color: var(--primary); margin: 0; font-size: 1.5rem; }
    
    /* Preview Table Styling */
    .table-container {
      overflow-x: auto;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #334155;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      background: #0f172a;
    }
    th {
      background: #1e293b;
      color: var(--primary);
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #334155;
      white-space: nowrap;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      white-space: nowrap;
    }

    .result-row { 
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .advice-box {
      margin-top: 20px; padding: 15px; border-radius: 12px;
      background: rgba(14, 165, 233, 0.1); border: 1px solid var(--primary);
      font-size: 0.9rem; line-height: 1.5; color: #e2e8f0;
    }
    .btn-close {
      background: #334155; color: white; border: none; width: 100%;
      padding: 12px; border-radius: 12px; margin-top: 15px; cursor: pointer;
    }

    .status-val {
      display: inline-block; padding: 2px 10px; border-radius: 4px;
      margin-top: 5px; text-transform: uppercase; font-size: 0.8rem;
    }
    
    .bg-aman, .bg-ctps, .bg-pammrt, .bg-psrt, .bg-plcrt { background: var(--success); color: white; }
    .bg-layak { background: var(--primary); color: white; }
    .bg-sharing, .bg-warning { background: var(--warning); color: white; }
    .bg-od, .bg-danger, .bg-tidak-ctps, .bg-tidak-pammrt, .bg-tidak-psrt, .bg-tidak-plcrt { background: var(--danger); color: white; }
    .bg-belum { background: #64748b; color: white; }

    .btn-excel {
      background: var(--excel); color: white; border: none; width: 100%;
      padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer;
      margin-top: 10px; display: none; align-items: center; justify-content: center; gap: 8px;
    }
    
    #kuis_container { display: none; }

    /* Loding state */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.8); z-index: 10000;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid rgba(14, 165, 233, 0.1);
      border-left-color: var(--primary); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="sync_status">
    ⏳ Menunggu Sinyal: <span id="queue_count">0</span> Data belum terkirim
  </div>

  <div class="loading-overlay" id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-size: 0.9rem; color: var(--primary);">Memproses ke Database...</p>
  </div>

  <div class="progress-container" id="pilarProgress">
    <div id="progress_fill"></div>
  </div>

  <div class="modal-overlay" id="modalResult">
    <div class="modal-content">
      <div class="modal-header">
        <h3>✨ Hasil Analisa STBM</h3>
        <p style="font-size: 0.8rem; color: #94a3b8;" id="res_nama_kk"></p>
      </div>
      
      <div id="resultList"></div>
      
      <div class="table-container">
        <table>
          <thead id="preview_head"></thead>
          <tbody id="preview_body"></tbody>
        </table>
      </div>

      <div class="advice-box" id="adviceContent"></div>
      
      <div class="nav-buttons">
          <button class="btn-close" onclick="closeModal()">Tutup</button>
          <button class="btn-save" style="margin-top: 15px; background: var(--excel); flex: 2;" onclick="exportToExcel()">📥 UNDUH EXCEL</button>
      </div>
      <button class="btn-save" style="background: var(--success);" onclick="simpanData()">✅ SIMPAN KE DATABASE</button>
    </div>
  </div>

  <div class="card" id="card_lokasi">
    <div class="card-header-toggle" onclick="toggleCard('card_lokasi')">
      <h2>📍 Data Lokasi & Petugas</h2>
      <span class="badge-info" id="badge_lokasi">Tersimpan</span>
    </div>
    <div class="card-content">
      <div class="grid-2">
        <div class="input-box">
          <label>Puskesmas</label>
          <input type="text" id="puskesmas" value="UPTD PUSKESMAS SAMPANAHAN" readonly>
        </div>
        <div class="input-box">
          <label>Desa/Kel</label>
          <select id="desa" class="kk-input" onchange="autoFillPetugas(); saveDraft();">
            <option value="" disabled selected>Pilih Desa</option>
            <option value="SAMPANAHAN HILIR">SAMPANAHAN HILIR</option>
            <option value="SAMPANAHAN HULU">SAMPANAHAN HULU</option>
            <option value="SUKA MAJU">SUKA MAJU</option>
            <option value="BANJARSARI">BANJARSARI</option>
          </select>
        </div>
        <div class="input-box"><label>Kecamatan</label><input type="text" id="kecamatan" value="SAMPANAHAN" class="kk-input" oninput="saveDraft()"></div>
        <div class="input-box"><label>Tanggal</label><input type="date" id="tanggal" class="kk-input" onchange="saveDraft()"></div>
      </div>
      <div class="input-box"><label>Nama Petugas Moniver</label><input type="text" id="petugas" class="kk-input" oninput="saveDraft()"></div>
    </div>
  </div>

  <div class="card" id="card_identitas">
    <div class="card-header-toggle" onclick="toggleCard('card_identitas')">
      <h2>👤 Identitas KK</h2>
      <span class="badge-info" id="badge_identitas">Tersimpan</span>
    </div>
    <div class="card-content">
      <div class="input-box">
        <label>Nomor KK (16 Digit)</label>
        <input type="number" id="no_kk" class="kk-input" oninput="this.value=this.value.slice(0,16); saveDraft();">
      </div>
      <div class="input-box"><label>Nama Kepala Keluarga</label><input type="text" id="nama_kk" class="kk-input" oninput="saveDraft()"></div>
      <div class="grid-2">
        <div class="input-box"><label>Jml Jiwa</label><input type="number" id="jml_jiwa" class="kk-input" oninput="saveDraft()"></div>
        <div class="input-box"><label>Jml Menetap</label><input type="number" id="jml_menetap" class="kk-input" oninput="saveDraft()"></div>
      </div>
      <button id="btn_save_kk" class="btn-kk btn-save-kk" onclick="validateAndLock()">SIMPAN IDENTITAS KK</button>
      <button id="btn_edit_kk" class="btn-kk btn-edit-kk" onclick="unlockKK()">EDIT IDENTITAS KK</button>
    </div>
  </div>

  <div id="kuis_container">
    <div class="card">
      <h2 id="pilar_title">📋 Evaluasi 5 Pilar STBM</h2>
      
      <div class="pilar-section active" id="section_p1">
        <label><strong>PILAR 1: STOP BABS</strong></label>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;">
        <div class="question-item">
          <label>1. Buang air besar di jamban sehat</label>
          <select id="p1_1" class="p1-input" onchange="hitungStatusP1(); saveDraft();">
            <option value="" disabled selected>Pilih</option>
            <option value="Y">Ya</option>
            <option value="T">Tidak</option>
          </select>
        </div>
        <div class="question-item">
          <label>2. Jamban milik sendiri</label>
          <select id="p1_2" class="p1-input" onchange="hitungStatusP1(); saveDraft();">
            <option value="" disabled selected>Pilih</option>
            <option value="Y">Ya</option>
            <option value="T">Tidak</option>
          </select>
        </div>
        <div class="question-item">
          <label>3. Bangunan Bawah (Pilih salah satu):</label>
          <select id="p1_3" class="p1-input" onchange="hitungStatusP1(); saveDraft();">
            <option value="" disabled selected>Pilih Opsi</option>
            <option value="A">A. Tangki septik disedot 3-5th / SPAL</option>
            <option value="B">B. Tidak pernah disedot > 5th / Baru</option>
            <option value="C">C. Cubluk / Lubang Tanah</option>
            <option value="D">D. Langsung ke drainase/sungai/kolam</option>
          </select>
        </div>
        <div class="question-item">
          <label>4. Kloset leher angsa</label>
          <select id="p1_4" class="p1-input" onchange="hitungStatusP1(); saveDraft();">
            <option value="" disabled selected>Pilih</option>
            <option value="Y">Ya</option>
            <option value="T">Tidak</option>
          </select>
        </div>
        <div class="nav-buttons">
          <button id="btn_next_p1" class="btn-next" onclick="nextStep(2)">LANJUT KE PILAR 2 →</button>
        </div>
      </div>

      <div class="pilar-section" id="section_p2">
        <label><strong>PILAR 2: CUCI TANGAN PAKAI SABUN</strong></label>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;">
        <div class="question-item">
          <label>1. Memiliki sarana CTPS (Air Mengalir + Sabun)</label>
          <select id="p2_1" class="p2-input" onchange="hitungStatusP2(); saveDraft();">
            <option value="" disabled selected>Pilih</option>
            <option value="Y">Ya</option>
            <option value="T">Tidak</option>
          </select>
        </div>
        <div class="question-item">
          <label>2. Mampu mempraktikkan cara CTPS</label>
          <select id="p2_2" class="p2-input" onchange="hitungStatusP2(); saveDraft();">
            <option value="" disabled selected>Pilih</option>
            <option value="Y">Ya</option>
            <option value="T">Tidak</option>
          </select>
        </div>
        <div class="question-item">
          <label>3. Mengetahui waktu-waktu kritis CTPS (Min. 3 waktu):</label>
          <select id="p2_3" class="p2-input" onchange="hitungStatusP2(); saveDraft();">
            <option value="" disabled selected>Pilih</option>
            <option value="Y">Tahu (Min 3)</option>
            <option value="T">Tidak Tahu</option>
          </select>
        </div>
        <div class="nav-buttons">
          <button class="btn-back" onclick="nextStep(1)">← KEMBALI</button>
          <button id="btn_next_p2" class="btn-next" onclick="nextStep(3)">LANJUT KE PILAR 3 →</button>
        </div>
      </div>

      <div class="pilar-section" id="section_p3">
        <label><strong>PILAR 3: PAMMRT</strong></label>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;">
        <div class="question-item"><label>1a. Pengolahan Air Minum</label><select id="p3_1a" class="p3-input" onchange="hitungStatusP3(); saveDraft();"><option value="" disabled selected>Pilih</option><option value="Y">Ya</option><option value="T">Tidak</option></select></div>
        <div class="question-item"><label>1b. Pengolahan Air Keruh</label><select id="p3_1b" class="p3-input" onchange="hitungStatusP3(); saveDraft();"><option value="" disabled selected>Pilih</option><option value="Y">Ya</option><option value="T">Tidak</option></select></div>
        <div class="question-item"><label>2. Wadah Tertutup</label><select id="p3_2" class="p3-input" onchange="hitungStatusP3(); saveDraft();"><option value="" disabled selected>Pilih</option><option value="Y">Ya</option><option value="T">Tidak</option></select></div>
        <div class="question-item"><label>3. Peralatan Bersih</label><select id="p3_3a" class="p3-input" onchange="hitungStatusP3(); saveDraft();"><option value="" disabled selected>Pilih</option><option value="Y">Ya</option><option value="T">Tidak</option></select></div>
        <div class="nav-buttons">
          <button class="btn-back" onclick="nextStep(2)">← KEMBALI</button>
          <button id="btn_next_p3" class="btn-next" onclick="nextStep(4)">LANJUT KE PILAR 4 →</button>
        </div>
      </div>

      <div class="pilar-section" id="section_p4">
        <label><strong>PILAR 4: PENGELOLAAN SAMPAH</strong></label>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;">
        <div class="question-item"><label>1. Tidak Sampah Berserakan</label><select id="p4_1" class="p4-input" onchange="hitungStatusP4(); saveDraft();"><option value="" disabled selected>Pilih</option><option value="Y">Ya</option><option value="T">Tidak</option></select></div>
        <div class="input-box"><label>2. Tempat Sampah Tertutup</label><select id="p4_2" class="p4-input" onchange="hitungStatusP4(); saveDraft();"><option value="" disabled selected>Pilih</option><option value="Y">Ya</option><option value="T">Tidak</option></select></div>
        <div class="nav-buttons">
          <button class="btn-back" onclick="nextStep(3)">← KEMBALI</button>
          <button id="btn_next_p4" class="btn-next" onclick="nextStep(5)">LANJUT KE PILAR 5 →</button>
        </div>
      </div>

      <div class="pilar-section" id="section_p5">
        <label><strong>PILAR 5: PENGELOLAAN LIMBAH CAIR</strong></label>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;">
        <div class="question-item"><label>1. SPAL Tertutup</label><select id="p5_1" class="p5-input" onchange="hitungStatusP5(); saveDraft();"><option value="" disabled selected>Pilih</option><option value="Y">Ya</option><option value="T">Tidak</option></select></div>
        
        <div class="summary-box">
            <div class="summary-item"><span>P1: Stop BABS</span><span id="sum_p1">-</span></div>
            <div class="summary-item"><span>P2: CTPS</span><span id="sum_p2">-</span></div>
            <div class="summary-item"><span>P3: PAMMRT</span><span id="sum_p3">-</span></div>
            <div class="summary-item"><span>P4: Sampah</span><span id="sum_p4">-</span></div>
            <div class="summary-item"><span>P5: Limbah</span><span id="sum_p5">-</span></div>
        </div>

        <div class="nav-buttons">
          <button class="btn-back" onclick="nextStep(4)">← KEMBALI</button>
          <button class="btn-save" onclick="showAnalisa()" style="flex:2; margin:0;">📊 LIHAT PRATINJAU DATA</button>
        </div>
      </div>

      <button id="btn_excel_main" class="btn-excel" onclick="showAnalisa()">📊 PRATINJAU TABEL EXCEL</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzNRUCsdXZYoOMLLVPny4dkaqjfoWFKqF2NqGjBxCtcwjwftP_2LoamPXJh0oywVgYG/exec";
    let pilar1Result = "", pilar2Result = "", pilar3Result = "", pilar4Result = "", pilar5Result = "";
    let isKKLocked = false;

    // --- LOGIKA INDEXEDDB UNTUK OFFLINE QUEUE ---
    const dbName = "STBM_Offline_DB";
    let db;
    const dbRequest = indexedDB.open(dbName, 1);

    dbRequest.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains("sync_queue")) {
        db.createObjectStore("sync_queue", { keyPath: "id", autoIncrement: true });
      }
    };

    dbRequest.onsuccess = (e) => { 
      db = e.target.result; 
      updateQueueUI();
      syncData(); 
    };

    window.onload = function() { loadDraft(); };

    // Jalankan sinkronisasi saat internet kembali aktif
    window.addEventListener('online', () => {
      console.log("Sinyal kembali! Memulai sinkronisasi...");
      syncData();
    });

    function updateQueueUI() {
      if (!db) return;
      const transaction = db.transaction(["sync_queue"], "readonly");
      const store = transaction.objectStore("sync_queue");
      const countRequest = store.count();
      countRequest.onsuccess = () => {
        const count = countRequest.result;
        const banner = document.getElementById('sync_status');
        if (count > 0) {
          banner.style.display = 'block';
          document.getElementById('queue_count').innerText = count;
        } else {
          banner.style.display = 'none';
        }
      };
    }

    function syncData() {
      if (!db || !navigator.onLine) return;

      const transaction = db.transaction(["sync_queue"], "readwrite");
      const store = transaction.objectStore("sync_queue");
      const getAll = store.getAll();

      getAll.onsuccess = () => {
        const items = getAll.result;
        if (items.length === 0) return;

        items.forEach(item => {
          const { id, ...dataOnly } = item;
          
          if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(() => {
              const deleteTx = db.transaction(["sync_queue"], "readwrite");
              deleteTx.objectStore("sync_queue").delete(id);
              console.log(`Data ID ${id} tersinkronisasi.`);
              updateQueueUI();
            }).processForm(dataOnly);
          } else {
            // Fallback fetch untuk testing browser biasa
            fetch(GAS_URL, { method: "POST", body: JSON.stringify(dataOnly) })
              .then(() => {
                const deleteTx = db.transaction(["sync_queue"], "readwrite");
                deleteTx.objectStore("sync_queue").delete(id);
                updateQueueUI();
              });
          }
        });
      };
    }

    function saveToOfflineQueue(data) {
      const transaction = db.transaction(["sync_queue"], "readwrite");
      const store = transaction.objectStore("sync_queue");
      store.add({ ...data, timestamp: new Date().toISOString() });
      
      alert("Sinyal lemah/tidak ada. Data DISIMPAN LOKAL dan akan terkirim otomatis saat ada sinyal.");
      document.getElementById('loader').style.display = 'none';
      localStorage.removeItem('stbm_draft');
      updateQueueUI();
      location.reload();
    }
    // --- AKHIR LOGIKA OFFLINE ---

    // --- LOGIKA AUTO FILL PETUGAS ---
    function autoFillPetugas() {
      const desa = document.getElementById('desa').value;
      const petugasInput = document.getElementById('petugas');
      
      const mapping = {
        "SAMPANAHAN HILIR": "Noor Latifah, S.Tr.Kes",
        "SAMPANAHAN HULU": "Hapipah Ambarwati, A. Md. Kes",
        "SUKA MAJU": "Hapipah Ambarwati, A. Md. Kes",
        "BANJARSARI": "Noor Latifah, S.Tr.Kes"
      };
      
      if (mapping[desa]) {
        petugasInput.value = mapping[desa];
      }
    }

    function saveDraft() {
        const data = getData();
        localStorage.setItem('stbm_draft', JSON.stringify(data));
    }

    function loadDraft() {
        const draft = localStorage.getItem('stbm_draft');
        if (draft) {
            const d = JSON.parse(draft);
            document.getElementById('desa').value = d.Desa || "";
            document.getElementById('kecamatan').value = d.Kecamatan || "SAMPANAHAN";
            document.getElementById('tanggal').value = d.Tanggal || "";
            document.getElementById('petugas').value = d.Petugas || "";
            document.getElementById('no_kk').value = d.No_KK || "";
            document.getElementById('nama_kk').value = d.Nama_KK || "";
            document.getElementById('jml_jiwa').value = d.Jml_Jiwa || "";
            document.getElementById('jml_menetap').value = d.Jml_Menetap || "";
            
            for(let i=1; i<=5; i++) {
                const inputs = document.querySelectorAll(`.p${i}-input`);
                inputs.forEach(input => {
                    if(d[`P${i}_Raw`]) {
                        const val = d[`P${i}_Raw`][input.id];
                        if(val) input.value = val;
                    }
                });
            }
            hitungStatusP1(); hitungStatusP2(); hitungStatusP3(); hitungStatusP4(); hitungStatusP5();
        }
    }

    function toggleCard(cardId) {
      if (!isKKLocked) return; 
      const card = document.getElementById(cardId);
      card.classList.toggle('card-collapsed');
    }

    function validateAndLock() {
      const inputs = document.querySelectorAll('.kk-input');
      const noKK = document.getElementById('no_kk').value;
      const jiwa = parseInt(document.getElementById('jml_jiwa').value);
      const menetap = parseInt(document.getElementById('jml_menetap').value);

      let valid = true;
      inputs.forEach(i => { if(!i.value) valid = false; });
      if(!valid) { alert("Lengkapi semua Identitas KK dan Lokasi!"); return; }
      if(noKK.length !== 16) { alert("Nomor KK harus tepat 16 digit!"); return; }
      if(menetap > jiwa) { alert("Jumlah menetap tidak boleh lebih besar dari jumlah jiwa!"); return; }

      document.getElementById('loader').style.display = 'flex';
      
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(existingData => {
          document.getElementById('loader').style.display = 'none';
          if (existingData) {
            const conf = confirm(`NIK/Nomor KK ${noKK} sudah tercatat atas nama ${existingData.Nama_KK}.\n\nApakah Anda ingin memperbarui (update) data tersebut?`);
            if (conf) lockKK();
          } else {
            lockKK();
          }
        }).checkDuplicateKK(noKK);
      } else {
        fetch(`${GAS_URL}?action=checkDuplicate&no_kk=${noKK}`)
          .then(res => res.json())
          .then(data => {
            document.getElementById('loader').style.display = 'none';
            if(data.exists) {
              const conf = confirm(`NIK/Nomor KK ${noKK} sudah tercatat atas nama ${data.Nama_KK}.\n\nApakah Anda ingin memperbarui (update) data tersebut?`);
              if(conf) lockKK();
            } else {
              lockKK();
            }
          })
          .catch(() => {
            document.getElementById('loader').style.display = 'none';
            lockKK();
          });
      }
    }

    function lockKK() {
      const inputs = document.querySelectorAll('.kk-input');
      inputs.forEach(i => {
        if(i.tagName === "SELECT") i.disabled = true;
        else i.readOnly = true;
      });

      isKKLocked = true;
      document.getElementById('btn_save_kk').style.display = 'none';
      document.getElementById('btn_edit_kk').style.display = 'block';
      document.getElementById('kuis_container').style.display = 'block';
      document.getElementById('pilarProgress').style.display = 'block';
      
      document.getElementById('card_lokasi').classList.add('card-collapsed');
      document.getElementById('card_identitas').classList.add('card-collapsed');
      document.getElementById('badge_lokasi').style.display = 'inline-block';
      document.getElementById('badge_identitas').style.display = 'inline-block';

      updateProgress(1);
    }

    function unlockKK() {
      const inputs = document.querySelectorAll('.kk-input');
      inputs.forEach(i => {
        if(i.tagName === "SELECT") i.disabled = false;
        else i.readOnly = false;
      });

      isKKLocked = false;
      document.getElementById('btn_save_kk').style.display = 'block';
      document.getElementById('btn_edit_kk').style.display = 'none';
      
      document.getElementById('card_lokasi').classList.remove('card-collapsed');
      document.getElementById('card_identitas').classList.remove('card-collapsed');
      document.getElementById('badge_lokasi').style.display = 'none';
      document.getElementById('badge_identitas').style.display = 'none';
    }

    function updateProgress(step) {
        const fill = document.getElementById('progress_fill');
        const percent = (step / 5) * 100;
        fill.style.width = percent + '%';
        document.getElementById('pilar_title').innerText = `📋 Evaluasi STBM (Step ${step} of 5)`;
    }

    function nextStep(step) {
      document.querySelectorAll('.pilar-section').forEach(sec => sec.classList.remove('active'));
      document.getElementById('section_p' + step).classList.add('active');
      updateProgress(step);
      window.scrollTo(0,0);
    }

    function checkPilarComplete(className, btnId) {
      const inputs = document.querySelectorAll('.' + className);
      let complete = true;
      inputs.forEach(input => { if (input.value === "") complete = false; });
      const btn = document.getElementById(btnId);
      if (btn) btn.style.display = complete ? "block" : "none";
      checkAllComplete();
    }

    function checkAllComplete() {
        const p1 = Array.from(document.querySelectorAll('.p1-input')).every(i => i.value !== "");
        const p2 = Array.from(document.querySelectorAll('.p2-input')).every(i => i.value !== "");
        const p3 = Array.from(document.querySelectorAll('.p3-input')).every(i => i.value !== "");
        const p4 = Array.from(document.querySelectorAll('.p4-input')).every(i => i.value !== "");
        const p5 = document.getElementById('p5_1').value !== "";
        document.getElementById('btn_excel_main').style.display = (p1 && p2 && p3 && p4 && p5) ? 'flex' : 'none';
    }

    function hitungStatusP1() {
      const q1 = document.getElementById('p1_1').value; 
      const q2 = document.getElementById('p1_2').value; 
      const q3 = document.getElementById('p1_3').value; 
      const q4 = document.getElementById('p1_4').value; 
      checkPilarComplete('p1-input', 'btn_next_p1');
      if (!q1 || !q2 || !q3 || !q4) return;
      if (q1 === "T" || q3 === "D") pilar1Result = "OD TERTUTUP";
      else if (q1 === "Y" && q2 === "T") pilar1Result = "SHARING";
      else if (q1 === "Y" && q2 === "Y" && q4 === "Y" && q3 === "A") pilar1Result = "AMAN";
      else if (q1 === "Y" && q2 === "Y" && q4 === "Y" && q3 === "B") pilar1Result = "LAYAK";
      else pilar1Result = "BELUM LAYAK";
      document.getElementById('sum_p1').innerText = pilar1Result;
    }

    function hitungStatusP2() {
      const q1 = document.getElementById('p2_1').value;
      const q2 = document.getElementById('p2_2').value;
      const q3 = document.getElementById('p2_3').value;
      checkPilarComplete('p2-input', 'btn_next_p2');
      if (!q1 || !q2 || !q3) return;
      pilar2Result = (q1 === "Y" && q2 === "Y" && q3 === "Y") ? "CTPS" : "TIDAK CTPS";
      document.getElementById('sum_p2').innerText = pilar2Result;
    }

    function hitungStatusP3() {
      const vals = Array.from(document.querySelectorAll('.p3-input')).map(i => i.value);
      checkPilarComplete('p3-input', 'btn_next_p3');
      if (vals.includes("")) return;
      pilar3Result = vals.every(v => v === "Y") ? "PAMMRT" : "TIDAK PAMMRT";
      document.getElementById('sum_p3').innerText = pilar3Result;
    }

    function hitungStatusP4() {
      const vals = Array.from(document.querySelectorAll('.p4-input')).map(i => i.value);
      checkPilarComplete('p4-input', 'btn_next_p4');
      if (vals.includes("")) return;
      pilar4Result = vals.every(v => v === "Y") ? "PSRT" : "TIDAK PSRT";
      document.getElementById('sum_p4').innerText = pilar4Result;
    }

    function hitungStatusP5() {
      const q = document.getElementById('p5_1').value;
      checkAllComplete();
      if (!q) return;
      pilar5Result = (q === "Y") ? "PLCRT" : "TIDAK PLCRT";
      document.getElementById('sum_p5').innerText = pilar5Result;
    }

    function generatePreview(data) {
      const headers = ["Tanggal", "Nama KK", "No KK", "P1 (Jamban)", "P2 (CTPS)", "P3 (Minum)", "P4 (Sampah)", "P5 (Limbah)"];
      const row = [data.Tanggal, data.Nama_KK, data.No_KK, data.Status_P1, data.Status_P2, data.Status_P3, data.Status_P4, data.Status_P5];
      
      let headHtml = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";
      let bodyHtml = "<tr>" + row.map((r, i) => {
          let cls = "";
          if(i > 2) cls = `style="color: ${r.includes('TIDAK') || r.includes('OD') || r.includes('BELUM') ? '#ef4444' : '#10b981'}; font-weight: bold;"`;
          return `<td ${cls}>${r}</td>`;
      }).join("") + "</tr>";
      
      document.getElementById('preview_head').innerHTML = headHtml;
      document.getElementById('preview_body').innerHTML = bodyHtml;
    }

    function showAnalisa() {
      const data = getData();
      const name = data.Nama_KK || "Keluarga";
      document.getElementById('res_nama_kk').innerText = "Data: " + name;
      
      generatePreview(data);

      let advice = "<strong>💡 Saran & Motivasi:</strong><br>";
      const results = [pilar1Result, pilar2Result, pilar3Result, pilar4Result, pilar5Result];
      const score = results.filter(r => ["AMAN", "LAYAK", "CTPS", "PAMMRT", "PSRT", "PLCRT"].includes(r)).length;
      
      if (score === 5) {
        advice += "Luar biasa! Keluarga ini sudah menjalankan 5 Pilar STBM dengan sempurna.";
      } else {
        advice += "Ada beberapa hal yang perlu ditingkatkan agar tercapai lingkungan sehat.";
      }
      document.getElementById('adviceContent').innerHTML = advice;
      document.getElementById('modalResult').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalResult').style.display = 'none'; }

    function getData() {
      const getRaw = (p) => {
          let obj = {};
          document.querySelectorAll(`.p${p}-input`).forEach(i => obj[i.id] = i.value);
          return obj;
      };

      return {
        Puskesmas: document.getElementById('puskesmas').value,
        Desa: document.getElementById('desa').value,
        Kecamatan: document.getElementById('kecamatan').value,
        Tanggal: document.getElementById('tanggal').value,
        Petugas: document.getElementById('petugas').value,
        No_KK: document.getElementById('no_kk').value,
        Nama_KK: document.getElementById('nama_kk').value,
        Jml_Jiwa: document.getElementById('jml_jiwa').value,
        Jml_Menetap: document.getElementById('jml_menetap').value,
        Status_P1: pilar1Result, Status_P2: pilar2Result, Status_P3: pilar3Result, Status_P4: pilar4Result, Status_P5: pilar5Result,
        P1_Raw: getRaw(1), P2_Raw: getRaw(2), P3_Raw: getRaw(3), P4_Raw: getRaw(4), P5_Raw: getRaw(5)
      };
    }

    function simpanData() {
      if(!confirm("Simpan data ini secara permanen ke database?")) return;
      const data = getData();

      // CEK KONEKSI: Jika Offline, masukkan ke antrean IndexedDB
      if (!navigator.onLine) {
        saveToOfflineQueue(data);
        return;
      }

      document.getElementById('loader').style.display = 'flex';

      if (typeof google !== 'undefined' && google.script) {
        google.script.run
          .withSuccessHandler(res => {
            document.getElementById('loader').style.display = 'none';
            alert("Berhasil disimpan!");
            localStorage.removeItem('stbm_draft');
            location.reload();
          })
          .withFailureHandler(err => {
            // Jika status online tapi gagal kirim (sinyal tidak stabil)
            saveToOfflineQueue(data);
          })
          .processForm(data); 
      } else {
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(data)
        })
        .then(() => {
          document.getElementById('loader').style.display = 'none';
          alert("Berhasil disimpan!");
          localStorage.removeItem('stbm_draft');
          location.reload();
        })
        .catch(() => {
          saveToOfflineQueue(data);
        });
      }
    }

    function exportToExcel() {
      const d = getData();
      const excelData = [{
        "TANGGAL SURVEY": d.Tanggal,
        "NAMA KEPALA KELUARGA": d.Nama_KK,
        "NOMOR KK": d.No_KK,
        "DESA": d.Desa,
        "KECAMATAN": d.Kecamatan,
        "PETUGAS": d.Petugas,
        "JML JIWA": d.Jml_Jiwa,
        "HASIL PILAR 1": d.Status_P1,
        "HASIL PILAR 2": d.Status_P2,
        "HASIL PILAR 3": d.Status_P3,
        "HASIL PILAR 4": d.Status_P4,
        "HASIL PILAR 5": d.Status_P5
      }];

      const ws = XLSX.utils.json_to_sheet(excelData);
      const wscols = [
        {wch:15}, {wch:25}, {wch:20}, {wch:20}, {wch:15}, {wch:20}, {wch:10}, 
        {wch:15}, {wch:15}, {wch:15}, {wch:15}, {wch:15}
      ];
      ws['!cols'] = wscols;

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Laporan_STBM");
      XLSX.writeFile(wb, `MONITORING_STBM_${d.Nama_KK}.xlsx`);
    }
  </script>
